<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin - Attendance Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .page-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: var(--white);
            padding: 2rem 0;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: var(--secondary-color);
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .form-container {
            max-width: 600px;
        }

        .error-message,
        .success-message {
            text-align: center;
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
        }

        .error-message {
            color: var(--danger-color);
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }

        .success-message {
            color: var(--success-color);
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="#" class="navbar-brand">AMS - Admin Panel</a>
                <ul class="navbar-menu">
                    <li><strong>Admin: {{ current_user.username }}</strong></li>
                    <li><a href="{{ url_for('logout') }}" class="logout-btn">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container">
            <h1 class="page-title">Add New Administrator</h1>
            <p>Create login access for a new admin user</p>
        </div>
    </div>

    <div class="container form-container">
        <a href="{{ url_for('admin_dashboard') }}" class="back-link">← Back to Dashboard</a>

        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}

        <div class="card">
            <form method="POST">
                <div class="form-group">
                    <label for="username">Username *</label>
                    <input type="text" id="username" name="username" required placeholder="e.g., admin2">
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required placeholder="e.g., admin@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password *</label>
                    <input type="password" id="password" name="password" required placeholder="Enter a strong password">
                </div>
                <button type="submit" class="btn btn-success btn-block">Create Admin</button>
            </form>
        </div>
    </div>
</body>
</html>
